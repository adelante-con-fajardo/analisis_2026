            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 6px 7px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #2c3e50;
            position: sticky;
            top: 0;
            white-space: nowrap;
        }

        tbody tr:hover {
            background-color: #f1f5f9;
        }

        /* Alineación a la derecha para los números */
        td:nth-child(2), td:nth-child(3), td:nth-child(4), td:nth-child(5) {
            text-align: right;
            white-space: nowrap;
        }

        /* Hacer la letra del municipio un poco más pequeña por defecto */
        td:first-child {
            font-size: 0.9em;
            font-weight: 500;
            color: #1e293b;
        }

        /* Clases de colores para la variación */
        .positivo { color: #10b981; font-weight: bold; }
        .negativo { color: #ef4444; font-weight: bold; }
        .neutro { color: #64748b; font-weight: bold; }

        /* Ajustes específicos para celulares */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            h1 {
                font-size: 1.2rem;
            }
            th, td {
                padding: 4px 3px;
                font-size: 0.85em; /* Letra general más pequeña */
            }
            /* Municipio aún más pequeño en celular para que quepa bien */
            td:first-child {

            }
            .controles {
                flex-direction: column;
                align-items: stretch;
            }
            select {
                width: 100%;

        const selectorDepartamento = document.getElementById('selector-departamento');
        const tbody = document.getElementById('tabla-body');

        // Función para limpiar los strings (ej. "2.927" -> 2927) y convertirlos a número
        const formatearNumeroString = (str) => {
            if (!str) return 0;
            return parseInt(str.toString().replace(/\./g, ''), 10);
        };

        // Llenar el selector (dropdown) con los departamentos que existan en el JSON
        const llenarSelector = () => {
            for (const departamento in datosElectorales) {
                const opcion = document.createElement('option');
                opcion.value = departamento;
                opcion.textContent = departamento;
                selectorDepartamento.appendChild(opcion);
            }
        };

        // Función para renderizar la tabla según el departamento elegido
        const renderizarTabla = (departamentoSeleccionado) => {
            tbody.innerHTML = ''; // Limpiar la tabla

            if (!departamentoSeleccionado) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #666;">Seleccione un departamento para ver los resultados.</td></tr>';
                return;
            }

            const municipios = datosElectorales[departamentoSeleccionado].municipios;

            municipios.forEach(dato => {
                const municipio = dato.municipio;
                const votos2022 = dato.votos_csv || 0;
                const votos2026 = formatearNumeroString(dato.votos_api);
                const porcentaje2026 = dato.porcentaje_api || "0,00%";

                let textoVotos2022 = votos2022 === 0 ? "Sin datos" : votos2022.toLocaleString('es-CO');

                // Calcular porcentaje de variación
                let htmlVariacion = "";
                if (votos2022 > 0) {
                    const variacion = ((votos2026 - votos2022) / votos2022) * 100;
                    const claseColor = variacion > 0 ? 'positivo' : (variacion < 0 ? 'negativo' : 'neutro');
                    const signo = variacion > 0 ? '+' : '';
                    htmlVariacion = `<span class="${claseColor}">${signo}${variacion.toFixed(2)}%</span>`;
                } else if (votos2026 > 0 && votos2022 === 0) {
                    htmlVariacion = `<span class="positivo">+100% (Nuevo)</span>`;
                } else {
                    htmlVariacion = `<span class="neutro">N/A</span>`;
                }

                // Crear la fila e insertarla en el HTML
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${municipio}</td>
                    <td>${textoVotos2022}</td>
                    <td>${votos2026.toLocaleString('es-CO')}</td>
                    <td>${htmlVariacion}</td>
                    <td><strong>${porcentaje2026}</strong></td>
                `;
                tbody.appendChild(tr);
            });
        };

        // Escuchar cuando el usuario cambie de departamento en el selector
        selectorDepartamento.addEventListener('change', (event) => {
            renderizarTabla(event.target.value);
        });

        // Inicializar la página llenando el selector
        llenarSelector();
    </script>
